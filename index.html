<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Wave Movie Maker</title>
    <style>
        @font-face {
            font-family: 'Cinecaption';
            src: url('https://dl.dropboxusercontent.com/scl/fi/gbyay8c3as3f0l2e2q2un/cinecaption_2.28.woff2?rlkey=pgaofit9g6699gsww2m3p9l7b&dl=0') format('woff2');
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Cinecaption', 'Courier New', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            padding: 20px 10px;
            overflow: hidden;
        }

        .header-zone {
            text-align: center;
            width: 100%;
        }
        .title {
            font-size: 1.4rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .decoration-line {
            font-size: 0.8rem;
            opacity: 0.8;
            white-space: nowrap;
        }

        .main-container {
            display: flex;
            width: 100%;
            max-width: 500px;
            background-color: #000000;
            align-items: stretch;
            justify-content: center;
        }

        .player-panel {
            background-color: #D3D3D3; 
            border-top-left-radius: 10px;
            border-bottom-left-radius: 10px;
            padding: 20px 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .canvas-container.theme-white {
            background-color: #ffffff;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* プレビュー再生用のビデオタグ（ Canvasと完全に重ねる ） */
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* 録音完了後に表示する */
        }

        .timer-display {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            color: #ff0844;
            display: none;
            z-index: 10; /* ビデオより前に出す */
        }

        .top-icons, .bottom-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            color: #4A5568;
            font-size: 1.2rem;
            margin-top: 15px;
        }
        .top-icons span, .bottom-controls span { cursor: pointer; transition: transform 0.1s; }
        .top-icons span:active, .bottom-controls span:active { transform: scale(0.9); }
        
        #recBtn.recording { color: #ff0844; }
        #downloadBtn.ready { color: #00f2fe; }

        .bottom-controls { font-size: 1.4rem; }
        .play-pause-btn { font-size: 1.8rem; }

        .seekbar-container {
            width: 100%;
            margin: 15px 0;
            display: flex;
            align-items: center;
        }
        .seekbar {
            width: 100%;
            accent-color: #4A5568;
            cursor: pointer;
        }

        .side-panel {
            width: 120px;
            padding: 10px 0 10px 15px;
            display: flex;
            flex-direction: column;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .setting-section {
            margin-bottom: 20px;
        }
        .setting-title {
            margin-bottom: 8px;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 3px;
        }
        .color-option {
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .color-option.active {
            opacity: 1;
        }
        .pointer {
            visibility: hidden;
            margin-right: 5px;
        }
        .color-option.active .pointer {
            visibility: visible;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            max-width: 90px;
        }
        
        .palette-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }
        .palette-circle.selected {
            border-color: #ffffff;
            transform: scale(1.1);
        }
        
        .p1 { background: linear-gradient(135deg, #fff3b0, #cae7e3); }
        .p2 { background: linear-gradient(135deg, #a8ff78, #78ffd6); }
        .p3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .p4 { background: linear-gradient(135deg, #ff0844, #ffb199); }
        .p5 { background: linear-gradient(135deg, #f107a3, #7b2ff7); }
        .p6 { background: linear-gradient(135deg, #13547a, #80d0c7); }

        .footer-zone {
            font-size: 0.9rem;
            opacity: 0.7;
            width: 100%;
            text-align: right;
            padding-right: 10px;
        }
    </style>
</head>
<body>

    <div class="header-zone">
        <div class="title">2min VOICE and MUSIC WAVE MOVIE</div>
        <div class="decoration-line">。.：★*・゜・✧.・☆.*Ø・.・゜◎.。・*★**・.✧.・☆.*Ø・.・゜◎.。</div>
    </div>

    <div class="main-container">
        
        <div class="player-panel">
            <div id="canvasBg" class="canvas-container">
                <canvas id="waveCanvas" width="600" height="600"></canvas>
                <video id="previewVideo" playsinline></video>
                <div id="timer" class="timer-display">02:00</div>
            </div>
            
            <div class="top-icons">
                <span id="downloadBtn" title="ダウンロード">📩</span>
                <span id="resetBtn" title="最初からやり直す（リセット）">↩️</span>
                <span>⏸️</span>
                <span id="stopBtn" title="録音停止">⏹️</span>
                <span id="recBtn" title="録音開始">⚪</span>
            </div>

            <div class="seekbar-container">
                <input type="range" id="seekBar" class="seekbar" value="0" min="0" max="100" step="0.1">
            </div>

            <div class="bottom-controls">
                <span id="skipBackBtn">⏮️</span>
                <span id="rewindBtn">⏪</span>
                <span id="playPauseBtn" class="play-pause-btn">▶️</span> <span id="forwardBtn">⏩</span>
                <span id="skipForwardBtn">⏭️</span>
            </div>
        </div>

        <div class="side-panel">
            <div class="setting-section">
                <div class="setting-title">BACK COLOR</div>
                <div id="btnBlack" class="color-option active">
                    <span class="pointer">▶</span>BLACK
                </div>
                <div id="btnWhite" class="color-option">
                    <span class="pointer">▶</span>WHITE
                </div>
            </div>

            <div class="setting-section">
                <div class="setting-title">WAVE COLOR</div>
                <div class="palette-grid">
                    <div class="palette-circle p1 selected" data-colors='["#fff3b0", "#cae7e3"]'></div>
                    <div class="palette-circle p2" data-colors='["#a8ff78", "#78ffd6"]'></div>
                    <div class="palette-circle p3" data-colors='["#4facfe", "#00f2fe"]'></div>
                    <div class="palette-circle p4" data-colors='["#ff0844", "#ffb199"]'></div>
                    <div class="palette-circle p5" data-colors='["#f107a3", "#7b2ff7"]'></div>
                    <div class="palette-circle p6" data-colors='["#13547a", "#80d0c7"]'></div>
                </div>
            </div>
        </div>

    </div>

    <div class="footer-zone">
        @mi11emint
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('previewVideo');
        
        const recBtn = document.getElementById('recBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const timerDisplay = document.getElementById('timer');
        const canvasBg = document.getElementById('canvasBg');
        const btnBlack = document.getElementById('btnBlack');
        const btnWhite = document.getElementById('btnWhite');
        const palettes = document.querySelectorAll('.palette-circle');
        
        // 再生コントロール系ボタンの取得
        const playPauseBtn = document.getElementById('playPauseBtn');
        const seekBar = document.getElementById('seekBar');
        const skipBackBtn = document.getElementById('skipBackBtn');
        const rewindBtn = document.getElementById('rewindBtn');
        const forwardBtn = document.getElementById('forwardBtn');
        const skipForwardBtn = document.getElementById('skipForwardBtn');
        
        let audioCtx, analyser, source, dataArray, stream;
        let animationId;
        let mediaRecorder;
        let recordedChunks = [];
        let videoUrl = null;
        
        let timerInterval;
        let timeLeft = 120;

        let currentBgColor = 'black';
        let currentWaveColors = ["#fff3b0", "#cae7e3"];

        // シークバーの自動更新を一時停止するためのフラグ（つまみを触っている間用）
        let isUserChangingIndex = false;

        drawStaticCircle();

        // --- 背景色・カラーパレット切り替え ---
        btnBlack.addEventListener('click', () => {
            if (videoUrl) return; // 録音後は切り替え不可
            currentBgColor = 'black';
            btnBlack.classList.add('active');
            btnWhite.classList.remove('active');
            canvasBg.classList.remove('theme-white');
            if (!audioCtx) drawStaticCircle();
        });

        btnWhite.addEventListener('click', () => {
            if (videoUrl) return; // 録音後は切り替え不可
            currentBgColor = 'white';
            btnWhite.classList.add('active');
            btnBlack.classList.remove('active');
            canvasBg.classList.add('theme-white');
            if (!audioCtx) drawStaticCircle();
        });

        palettes.forEach(palette => {
            palette.addEventListener('click', () => {
                if (videoUrl) return; // 録音後は切り替え不可
                palettes.forEach(p => p.classList.remove('selected'));
                palette.classList.add('selected');
                currentWaveColors = JSON.parse(palette.dataset.colors);
                if (!audioCtx) drawStaticCircle();
            });
        });

        function clearCanvas() {
            ctx.fillStyle = currentBgColor === 'black' ? '#000000' : '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawStaticCircle() {
            clearCanvas();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseRadius = 140;
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, currentWaveColors[0]);
            gradient.addColorStop(1, currentWaveColors[1]);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius, 0, Math.PI * 2);
            ctx.stroke();
        }

        // --- 録音スタート ---
        recBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") return;
            
            // すでに動画がある場合は先にリセットを促す
            if (videoUrl) {
                alert("すでに録音された動画があります。↩️マークを押してリセットしてください。");
                return;
            }

            try {
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                draw();

                const canvasStream = canvas.captureStream(30); 
                const combinedStream = new MediaStream([
                    ...canvasStream.getVideoTracks(),
                    ...stream.getAudioTracks()
                ]);

                recordedChunks = [];
                const options = {
                    mimeType: 'video/webm;codecs=vp9,opus',
                    videoBitsPerSecond: 1000000,
                    audioBitsPerSecond: 128000
                };
                
                mediaRecorder = new MediaRecorder(combinedStream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    videoUrl = URL.createObjectURL(blob);
                    
                    // ビデオ要素に動画をセットして準備
                    video.src = videoUrl;
                    video.style.display = 'block'; // Canvasの上にビデオを表示して被せる
                    canvas.style.display = 'none'; // Canvasを一旦隠す
                    
                    downloadBtn.classList.add('ready');
                    playPauseBtn.innerText = "▶️"; // 再生準備完了のマークに
                    alert("録音が終了しました！下の再生ボタンで確認できます。");
                };

                mediaRecorder.start();
                
                recBtn.classList.add('recording');
                downloadBtn.classList.remove('ready');
                timerDisplay.style.display = 'block';
                
                timeLeft = 120;
                updateTimerText();
                timerInterval = setInterval(() => {
                    timeLeft--;
                    updateTimerText();
                    if (timeLeft <= 0) {
                        stopRecording();
                    }
                }, 1000);

            } catch (err) {
                alert("マイクの起動に失敗しました: " + err);
            }
        });

        // --- 録音ストップ ---
        stopBtn.addEventListener('click', () => {
            stopRecording();
        });

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
            }
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            if (animationId) {
                cancelAnimationFrame(animationId); // 波形の描画ループを止める
            }
            clearInterval(timerInterval);
            recBtn.classList.remove('recording');
            timerDisplay.style.display = 'none';
        }

        function updateTimerText() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        // --- ↩️ リセット（最初からやり直し）機能 ---
        resetBtn.addEventListener('click', () => {
            if (confirm("録音したデータを消去して、最初からやり直しますか？")) {
                // ビデオとURLの破棄
                video.pause();
                video.src = "";
                videoUrl = null;
                video.style.display = 'none';
                canvas.style.display = 'block';
                
                // 各種状態の初期化
                audioCtx = null;
                seekBar.value = 0;
                playPauseBtn.innerText = "▶️";
                downloadBtn.classList.remove('ready');
                
                drawStaticCircle();
            }
        });

        // --- 📩 ダウンロード機能 ---
        downloadBtn.addEventListener('click', () => {
            if (!videoUrl) {
                alert("先に⚪ボタンで録音してください。");
                return;
            }
            const a = document.createElement('a');
            a.href = videoUrl;
            a.download = `voice-wave-${Date.now()}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // ==========================================
        // 🎬 プレビュー再生コントロール機能（追加部分）
        // ==========================================

        // 1. 再生・一時停止ボタン
        playPauseBtn.addEventListener('click', () => {
            if (!videoUrl) return; // 録音前なら何もしない
            
            if (video.paused) {
                video.play();
                playPauseBtn.innerText = "⏸️"; // 一時停止マークにする
            } else {
                video.pause();
                playPauseBtn.innerText = "▶️"; // 再生マークにする
            }
        });

        // 2. ビデオの読み込みが終わったらシークバーの最大値を動画の長さに合わせる
        video.addEventListener('loadedmetadata', () => {
            seekBar.max = video.duration;
            seekBar.value = 0;
        });

        // 3. 再生中にシークバーを自動で進める
        video.addEventListener('timeupdate', () => {
            if (!isUserChangingIndex) {
                seekBar.value = video.currentTime;
            }
        });

        // 4. 動画が最後まで再生し終わったらマークを戻す
        video.addEventListener('ended', () => {
            playPauseBtn.innerText = "▶️";
            seekBar.value = 0;
        });

        // 5. ユーザーがシークバーのつまみを触っているときの処理
        seekBar.addEventListener('input', () => {
            if (!videoUrl) return;
            isUserChangingIndex = true;
            video.currentTime = seekBar.value; // つまみの位置に合わせて動画の時間を飛ばす
        });

        seekBar.addEventListener('change', () => {
            isUserChangingIndex = false;
        });

        // 6. 各種スキップ・巻き戻しボタン（5秒ずつ移動）
        skipBackBtn.addEventListener('click', () => {
            if (!videoUrl) return;
            video.currentTime = 0; // 一番最初に戻る
        });

        rewindBtn.addEventListener('click', () => {
            if (!videoUrl) return;
            video.currentTime = Math.max(0, video.currentTime - 5); // 5秒戻る
        });

        forwardBtn.addEventListener('click', () => {
            if (!videoUrl) return;
            video.currentTime = Math.min(video.duration, video.currentTime + 5); // 5秒進む
        });

        skipForwardBtn.addEventListener('click', () => {
            if (!videoUrl) return;
            video.currentTime = video.duration; // 一番最後まで進む
        });

        // 波形描画ループ
        function draw() {
            animationId = requestAnimationFrame(draw);
            analyser.getByteFrequencyData(dataArray);
            
            clearCanvas();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseRadius = 140;
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, currentWaveColors[0]);
            gradient.addColorStop(1, currentWaveColors[1]);
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            
            const points = dataArray.length;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const audioValue = dataArray[i] / 255; 
                const waveLength = audioValue * 90; 
                
                const startX = centerX + Math.cos(angle) * baseRadius;
                const startY = centerY + Math.sin(angle) * baseRadius;
                const endX = centerX + Math.cos(angle) * (baseRadius + waveLength);
                const endY = centerY + Math.sin(angle) * (baseRadius + waveLength);
                
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(endX, endY);
                ctx.stroke();
            }
        }
    </script>
</body>
</html>
